# NGINX reverse proxy for Production Overview Dashboard
# -----------------------------------------------------------------------------
# Layout:
#   /                -> static files from frontend/build (Vite output)
#   /api/*           -> Express backend on 127.0.0.1:3001
#   /ws              -> WebSocket on the same backend (real-time updates)
#   /health          -> backend health check (optional passthrough)
#
# Notes:
# - Vite outDir is "build" (see frontend/vite.config.ts), not "dist".
# - Backend already mounts routes under /api, so we proxy /api/ as-is
#   without any URI rewrite.
# - The placeholder __FRONTEND_DIST__ is replaced with an absolute path
#   by deploy.sh; do not edit it manually.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;            # internal IP only, no domain

    # Absolute path to Vite build output, injected by deploy script.
    # Quoted so that paths containing spaces (e.g. "Program Files") work.
    root "__FRONTEND_DIST__";
    index index.html;

    # Hide NGINX version in headers and error pages
    server_tokens off;

    # Allow reasonably large request bodies (uploads, JSON payloads, etc.)
    client_max_body_size 25m;

    # ---------------------------------------------------------------------
    # Compression
    # ---------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ---------------------------------------------------------------------
    # Cache hashed static assets aggressively (Vite emits hashed filenames)
    # ---------------------------------------------------------------------
    location ~* \.(?:js|mjs|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp|avif|map)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------
    # REST API -> Express backend
    # ---------------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ---------------------------------------------------------------------
    # WebSocket endpoint for real-time machine status updates
    # (backend uses ws://.../ws via the `ws` package)
    # ---------------------------------------------------------------------
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Keep long-lived WebSocket connections open
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }

    # ---------------------------------------------------------------------
    # Optional: expose backend health endpoint at the same origin
    # ---------------------------------------------------------------------
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
    }

    # ---------------------------------------------------------------------
    # SPA fallback: any unknown path serves index.html so React Router
    # (or Vite dev) can handle client-side routing.
    # ---------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
