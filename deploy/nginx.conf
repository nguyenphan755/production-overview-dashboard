# =============================================================================
# Production Overview Dashboard — NGINX site configuration
# =============================================================================
#
# 1) Rate-limit zone MUST live in the main nginx.conf inside http { ... }
#    (this file only contains server { } — include it from sites-enabled or copy
#    the line below into http{}):
#
#    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
#
# 2) Replace FRONTEND_DIST with the absolute path to the Vite build output,
#    e.g. Linux:   /srv/production-dashboard/frontend/build
#         Windows: C:/MES/production-dashboard/frontend/build
#    (Vite outDir is `build/` in this repo, not `dist/`.)
#
# 3) Backend listens on PORT from backend/.env (default 3001). Change the port
#    in every proxy_pass http://127.0.0.1:3001... line if needed.
#
# =============================================================================

# --- paste into http{} if not already present ---
# limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;

server {
    listen 8080;
    server_name _;

    server_tokens off;
    client_max_body_size 5m;

    # UPDATE: absolute path to frontend/build after `npm run build` in frontend/
    root FRONTEND_DIST;
    index index.html;

    # Backend Node (Express) — default PORT=3001 (see backend/.env).
    # Replace port in all proxy_pass lines below if PORT differs.

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # Tight CSP; same-origin API/WebSocket via nginx. If you split UI/API ports without nginx, extend connect-src.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; upgrade-insecure-requests" always;

    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    # Dotfiles (except ACME)
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # Load balancer / uptime — proxied to Express (avoid SPA fallback eating /health)
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # REST API
    location /api/ {
        limit_req zone=api_per_ip burst=30 nodelay;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Keep if cookies are ever scoped under /api (JWT today is mostly localStorage)
        proxy_cookie_path /api /api;
    }

    # WebSocket realtime (Express ws on path /ws)
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 60s;
    }

    # SPA static
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
